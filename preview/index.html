<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Preview - Delivery Control (Enviar WhatsApp)</title>
    <style>
      body{font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:#f5f7fb; color:#1f2937; margin:0; padding:24px}
      .container{max-width:760px;margin:0 auto;background:#fff;padding:24px;border-radius:8px;box-shadow:0 6px 18px rgba(15,23,42,0.06)}
      h1{margin-top:0;font-size:20px}
      label{display:block;margin-top:12px;font-weight:600}
      input[type=text], textarea{width:100%;padding:10px;border-radius:6px;border:1px solid #e5e7eb;font-size:14px}
      textarea{min-height:120px}
      .row{display:flex;gap:12px;margin-top:12px}
      button{background:#2563eb;color:#fff;padding:10px 14px;border-radius:6px;border:0;cursor:pointer}
      button.secondary{background:#f3f4f6;color:#111}
      .small{font-size:13px;color:#6b7280}
      .links{margin-top:12px}
      .status{margin-top:12px;padding:10px;border-radius:6px;background:#f8fafc;color:#0f172a}
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Preview - Enviar WhatsApp (Delivery Control)</h1>
      <p class="small">Esta prévia demonstra como enviar uma mensagem via preview API (usa Puppeteer). Use apenas para testes locais.</p>

      <label for="phone">Número (formato internacional sem + ou espaços, ex.: 5511912345678)</label>
      <input id="phone" type="text" placeholder="5511912345678" />

      <label for="message">Mensagem</label>
      <textarea id="message">Olá! Esta é uma mensagem de teste enviada pela prévia do app.</textarea>

      <div class="row">
        <button id="sendBtn">Enviar via API (Puppeteer)</button>
        <button id="openWebBtn" class="secondary">Abrir no WhatsApp Web</button>
        <button id="openWaMeBtn" class="secondary">Abrir via wa.me</button>
      </div>

      <div class="links small">
        <p>Observações: para envio real pelo servidor, execute o preview/server.ts localmente e escaneie o QR na primeira execução (headless=false).</p>
      </div>

      <div id="status" class="status" style="display:none"></div>
    </div>

    <script>
      const phoneEl = document.getElementById('phone');
      const messageEl = document.getElementById('message');
      const sendBtn = document.getElementById('sendBtn');
      const openWebBtn = document.getElementById('openWebBtn');
      const openWaMeBtn = document.getElementById('openWaMeBtn');
      const statusEl = document.getElementById('status');

      function showStatus(text, isError=false){
        statusEl.style.display = 'block';
        statusEl.textContent = text;
        statusEl.style.background = isError ? '#fff1f2' : '#f0fdf4';
        statusEl.style.color = isError ? '#7f1d1d' : '#064e3b';
      }

      sendBtn.addEventListener('click', async () => {
        const phone = phoneEl.value.trim();
        const message = messageEl.value.trim();
        if(!phone || !message){ showStatus('Número e mensagem são obrigatórios.', true); return; }
        showStatus('Enviando... (aguarde)');
        try{
          const res = await fetch('/api/send-whatsapp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone, message })
          });
          const data = await res.json();
          if(res.ok) showStatus('Mensagem enviada com sucesso (verifique o browser/WhatsApp).');
          else showStatus('Erro: ' + (data?.error || 'não especificado'), true);
        }catch(err){
          showStatus('Erro na requisição: ' + err.message, true);
        }
      });

      openWebBtn.addEventListener('click', () => {
        const phone = phoneEl.value.trim();
        const message = encodeURIComponent(messageEl.value.trim());
        if(!phone){ showStatus('Digite o número primeiro.', true); return; }
        const url = `https://web.whatsapp.com/send?phone=${phone}&text=${message}`;
        window.open(url, '_blank');
      });

      openWaMeBtn.addEventListener('click', () => {
        const phone = phoneEl.value.trim();
        const message = encodeURIComponent(messageEl.value.trim());
        if(!phone){ showStatus('Digite o número primeiro.', true); return; }
        const url = `https://wa.me/${phone}?text=${message}`;
        window.open(url, '_blank');
      });
    </script>
  </body>
</html>
